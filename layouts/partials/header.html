<header class="header">
    <nav class="nav">
        <div class="logo">
            <a href="{{ "" | absURL }}" accesskey="h" title="Home (Alt + H)">
                <img src="{{ "images/logo.png" | absURL }}" alt="Logo" class="logo-img">
                <span class="logo-text">{{ .Site.Title }}</span>
            </a>
        </div>
        <ul id="menu">
            {{- range .Site.Menus.main }}
            <li>
                <a href="{{ .URL | absURL }}" title="{{ .Name }}">
                    <span>{{ .Name }}</span>
                </a>
            </li>
            {{- end }}
        </ul>
        <div class="logo-switches">
            <button id="theme-toggle" accesskey="t" title="(Alt + T)">
                <svg id="moon" xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun" xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
            <button id="hamburger-menu-toggle" class="burger-btn" aria-label="Toggle Menu">
                <span class="burger-line"></span>
                <span class="burger-line"></span>
                <span class="burger-line"></span>
            </button>
        </div>
    </nav>
</header>

<script>
    // Pull the theme toggle functionality straight from PaperMod's core engine
    document.getElementById("theme-toggle").addEventListener("click", () => {
        if (document.body.className.includes("dark")) {
            document.body.classList.remove('dark');
            localStorage.setItem("pref-theme", 'light');
        } else {
            document.body.classList.add('dark');
            localStorage.setItem("pref-theme", 'dark');
        }
    });

    // Mobile hamburger menu trigger
    const burgerBtn = document.getElementById("hamburger-menu-toggle");
    const linksMenu = document.getElementById("menu");
    if (burgerBtn && linksMenu) {
        burgerBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            linksMenu.classList.toggle("mobile-menu-active");
            burgerBtn.classList.toggle("burger-transform-active");
        });
    }
</script>
