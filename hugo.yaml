baseURL: "https://multi-insight-hub.bitlitesolutions.workers.dev"
languageCode: "en-us"
title: "Multi-Insight Hub"
theme: "hugo-PaperMod"

pagination:
  pagerSize: 12

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "Current Affairs"
      url: "/current-affairs/"
      weight: 20  
    - name: "Technology"
      url: "/tech/"
      weight: 30
    - name: "Science"
      url: "/science/"
      weight: 40
    - name: "Finance"
      url: "/finance/"
      weight: 50
    - name: "Social Studies"
      url: "/social-studies/"
      weight: 60
    - name: "About Us"
      url: "/about-us/"
      weight: 70
    - name: "Contact Us"
      url: "/contact-us/"
      weight: 80
    - name: "🔍 Search"
      url: "/search/"
      weight: 90
      
params:
  env: "production"
  description: "Premium insights, breakthrough trends, and expert analyses across technology, deep science, history, and global financial markets."
  author: "Editorial Team"
  
  # Core Native Theme Configurations
  defaultTheme: auto # Options: auto, light, dark
  disableThemeToggle: false # Exposes PaperMod's built-in toggler variables
  disableThemeChange: false

  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  ThemeToggle: true

  # PaperMod Natively Verified Icon/Logo Registry Block
  label:
    text: "Multi-Insight Hub"
    icon: "images/logo.png" # Automatically matches your placeholder asset file path
    iconHeight: 28

  homeInfoParams:
    Title: "Multi-Insight Hub"
    Content: "Welcome to the intersection of deep analytical thought and modern global journalism. Explore our structured niches through the categories above."

  adsense:
    client: "ca-pub-XXXXXXXXXXXXXXXX"