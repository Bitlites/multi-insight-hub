baseURL: "https://multi-insight-hub.bitlitesolutions.workers.dev/"
languageCode: "en-us"
title: "Multi-Insight Hub"
theme: "hugo-PaperMod"

paginate: 12

outputs:
  home:
    - HTML
    - RSS
    - JSON # Required for the 🔍 Search page engine to read your posts

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "Current Affairs"
      url: "/current-affairs/"
      weight: 20  
    - name: "Technology"
      url: "/tech/"
      weight: 30
    - name: "Science"
      url: "/science/"
      weight: 40
    - name: "Finance"
      url: "/finance/"
      weight: 50
    - name: "Social Studies"
      url: "/social-studies/"
      weight: 60
    - name: "About Us"
      url: "/aboout-us/"
      weight: 70
    - name: "Contact Us"
      url: "/contact-us/"
      weight: 80
    - name: "🔍 Search"
      url: "/search/"
      weight: 90
      
params:
  env: "production"
  description: "Premium insights, breakthrough trends, and expert analyses across technology, deep science, history, and global financial markets."
  author: "Editorial Team"
  
  # PaperMod Specific Design Options
  defaultTheme: "dark"
  disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # Editorial Layout System
  homeInfoParams:
    Title: "Multi-Insight Hub"
    Content: "Welcome to the intersection of deep analytical thought and modern global journalism. Explore our structured niches below."

  # Placeholder for Google AdSense Configuration
  adsense:
    client: "ca-pub-XXXXXXXXXXXXXXXX" # Replace with your AdSense ID later

# Correctly unnested asset configurations
assets:
  css:
    - "css/custom.css"
