<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #121212; color: #fff; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #38bdf8; }
        .post { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    
    <h2>Latest Articles</h2>
    {{ range first 10 .Site.RegularPages }}
        <div class="post">
            <h3><a href="{{ .Permalink }}" style="color: #38bdf8; text-decoration: none;">{{ .Title }}</a></h3>
            <p>{{ .Summary }}</p>
        </div>
    {{ end }}
</body>
</html>
